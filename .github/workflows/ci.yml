name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-quality:
    name: Backend — Lint, Type-check & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check backend/

      - name: Black format check
        run: uv run black --check backend/

      - name: Mypy type check
        run: uv run mypy backend/

      - name: Unit tests
        run: uv run pytest tests/unit/ -v

  e2e-tests:
    name: E2E — Playwright against mock app
    runs-on: ubuntu-latest
    needs: backend-quality

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install Python deps
        run: uv sync --no-group dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node deps
        run: npm ci

      # tests/verify_tests.sh runs `npx playwright test` with no --project
      # filter, so it exercises every project in playwright.config.ts
      # (chromium, firefox, webkit, plus the Mobile Chrome/Safari device
      # profiles, which reuse the chromium/webkit engines) -- installing
      # only chromium here left every one of those runs failing on
      # "Executable doesn't exist" for firefox/webkit regardless of app
      # health, both in the healthy baseline run and all 4 fault-injection
      # runs.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run E2E verification harness
        run: |
          chmod +x tests/verify_tests.sh
          ./tests/verify_tests.sh

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  e2e-real-backend:
    name: E2E — Playwright against real backend + real frontend
    runs-on: ubuntu-latest
    needs: backend-quality

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install Python deps
        run: uv sync --no-group dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend deps
        run: pnpm install
        working-directory: frontend

      - name: Install root Playwright deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ENVIRONMENT=test forces backend/core/config.py's Settings.is_test_mode,
      # which in turn forces MockVectorStore (backend/rag/__init__.py) and a
      # None Gemini client (backend/services/gemini.py's get_genai_client) --
      # this job must NEVER dial out to live Gemini or a real ChromaDB.
      # GEMINI_API_KEY is deliberately left unset (no secret referenced here).
      # DATABASE_URL points outside the repo so this never touches data/.
      # BACKEND_URL/FRONTEND_URL must match the non-default ports this job
      # actually uses (8100/3100, to avoid colliding with the mock-app E2E
      # job's 8000/3099) -- backend/services/payments_mor.py's
      # build_mock_checkout_url()/build_success_redirect_url() embed these
      # settings directly into the mock-checkout redirect chain, so a wrong
      # port here means the browser navigates to a URL nothing listens on.
      - name: Start real backend (test mode)
        env:
          ENVIRONMENT: test
          VECTOR_STORE: mock
          DATABASE_URL: "sqlite:////tmp/rapp_ci_real_backend.db"
          ALLOWED_ORIGINS: "http://localhost:3100,http://127.0.0.1:3100"
          BACKEND_URL: "http://127.0.0.1:8100"
          FRONTEND_URL: "http://127.0.0.1:3100"
        run: |
          uv run uvicorn backend.main:app --host 127.0.0.1 --port 8100 > backend.log 2>&1 &
          echo $! > backend.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8100/health > /dev/null; then
              echo "Backend is up."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Backend failed to start within timeout." >&2
              cat backend.log
              exit 1
            fi
            sleep 1
          done

      - name: Start real frontend (dev server)
        env:
          NEXT_PUBLIC_API_URL: "http://127.0.0.1:8100"
        run: |
          ./node_modules/.bin/next dev -p 3100 > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3100 > /dev/null; then
              echo "Frontend is up."
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Frontend failed to start within timeout." >&2
              cat ../frontend.log
              exit 1
            fi
            sleep 1
          done
        working-directory: frontend

      - name: Run real-backend smoke test
        env:
          FRONTEND_URL: "http://127.0.0.1:3100"
        run: npx playwright test --config=playwright.real-backend.config.ts

      - name: Stop real backend & frontend
        if: always()
        run: |
          kill "$(cat backend.pid)" 2>/dev/null || true
          kill "$(cat frontend.pid)" 2>/dev/null || true

      - name: Upload backend/frontend logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: real-backend-logs
          path: |
            backend.log
            frontend.log
          retention-days: 7

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-real-backend
          path: playwright-report/
          retention-days: 7

  frontend-build:
    name: Frontend — TypeScript & Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend deps
        run: pnpm install
        working-directory: frontend

      - name: TypeScript & ESLint check
        run: pnpm build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
