name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-quality:
    name: Backend — Lint, Type-check & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check backend/

      - name: Black format check
        run: uv run black --check backend/

      - name: Mypy type check
        run: uv run mypy backend/

      - name: Unit tests
        run: uv run pytest tests/unit/ -v

  e2e-tests:
    name: E2E — Playwright against mock app
    runs-on: ubuntu-latest
    needs: backend-quality

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install Python deps
        run: uv sync --no-group dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E verification harness
        run: |
          chmod +x tests/verify_tests.sh
          ./tests/verify_tests.sh

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  frontend-build:
    name: Frontend — TypeScript & Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend deps
        run: pnpm install
        working-directory: frontend

      - name: TypeScript & ESLint check
        run: pnpm build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
