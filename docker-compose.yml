services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: rapp-backend:latest
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - LOG_FORMAT=json
      - VECTOR_STORE=${VECTOR_STORE:-chromadb}
      - CHROMA_DB_PATH=/app/data/chroma_db
    volumes:
      - chroma_data:/app/data/chroma_db
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    image: rapp-frontend:latest
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local
